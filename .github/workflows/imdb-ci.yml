name: imdb CI

on:
  push:
    paths:
      - 'imdb/**'
      - '.github/workflows/imdb-ci.yml'
  pull_request:
    paths:
      - 'imdb/**'
      - '.github/workflows/imdb-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        working-directory: imdb
        run: mvn -B test
