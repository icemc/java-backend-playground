networks:
  imdb-net:
    name: imdb-net

volumes:
  imdb_data:
  redis_data:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:
  alloy_data:

services:
  # ---------------------------------------------------------------------
  # Data stores
  # ---------------------------------------------------------------------

  postgres:
    image: abanda/imdb-postgresql:latest
    container_name: imdb-postgres
    ports:
      - "5432:5432"
    volumes:
      - imdb_data:/var/lib/postgresql/data
    environment:
      # MINIMAL_DATASET is honored by upstream image tooling for a faster,
      # smaller import while iterating locally; unset/false loads the full dataset.
      MINIMAL_DATASET: "false"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imdb -d imdb"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40m # first-run TSV import can take 20-30 minutes
    networks:
      - imdb-net

  redis:
    image: redis:7-alpine
    container_name: imdb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - imdb-net

  # ---------------------------------------------------------------------
  # Application (built once the Spring Boot project is scaffolded)
  # ---------------------------------------------------------------------

  imdb-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: imdb-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/imdb
      SPRING_DATASOURCE_USERNAME: imdb
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
      BACON_PERSON_NAME: "Kevin Bacon"
      SIX_DEGREES_MAX_DEPTH: "7"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - imdb-net

  # ---------------------------------------------------------------------
  # Metrics
  # ---------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:latest
    container_name: imdb-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --enable-feature=remote-write-receiver # accepts k6's experimental-prometheus-rw output
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - imdb-net

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: imdb-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://imdb:password@postgres:5432/imdb?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - imdb-net

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: imdb-redis-exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - imdb-net

  # ---------------------------------------------------------------------
  # Logs
  # ---------------------------------------------------------------------

  loki:
    image: grafana/loki:latest
    container_name: imdb-loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    networks:
      - imdb-net

  grafana-alloy:
    image: grafana/alloy:latest
    container_name: imdb-alloy
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "12345:12345"
    depends_on:
      - loki
    networks:
      - imdb-net

  # ---------------------------------------------------------------------
  # Traces
  # ---------------------------------------------------------------------

  tempo:
    image: grafana/tempo:latest
    container_name: imdb-tempo
    command: -config.file=/etc/tempo.yaml
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200" # Tempo query API
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
    networks:
      - imdb-net

  # ---------------------------------------------------------------------
  # Dashboards
  # ---------------------------------------------------------------------

  grafana:
    image: grafana/grafana:latest
    container_name: imdb-grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - imdb-net

  # ---------------------------------------------------------------------
  # Load testing (opt-in: `docker compose --profile load-test run k6 run /scripts/<name>.js`)
  # ---------------------------------------------------------------------

  k6:
    image: grafana/k6:latest
    container_name: imdb-k6
    profiles: ["load-test"]
    environment:
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
    volumes:
      - ./k6:/scripts:ro
    networks:
      - imdb-net
